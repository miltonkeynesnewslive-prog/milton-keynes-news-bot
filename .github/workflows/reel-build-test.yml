name: "Reel Build Test"

on:
  workflow_dispatch:

jobs:
  reel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install edge-tts feedparser requests Pillow

      - name: Build the reel
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python build_reel.py

      - name: Upload reel + script
        uses: actions/upload-artifact@v4
        with:
          name: daily-reel
          path: |
            reel.mp4
            reel_script.txt
